# fly.toml app configuration file generated for kwami-lk-api on 2026-02-24T21:05:48+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# To run a single machine: fly scale count 1

app = 'kwami-lk-api'
primary_region = 'lhr'

[build]

[env]
  API_HOST = '0.0.0.0'
  API_PORT = '8080'
  APP_ENV = 'production'
  DEBUG = 'false'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
